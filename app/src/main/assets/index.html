<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>游戏合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .title {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .subtitle {
            font-size: 1em;
            opacity: 0.7;
            margin-bottom: 40px;
        }
        .game-list {
            width: 90vw;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .game-card {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 24px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .game-card:hover, .game-card:active {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .game-icon {
            font-size: 2.8em;
            margin-right: 20px;
            width: 60px;
            text-align: center;
        }
        .game-info h2 {
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        .game-info p {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .game-card.fc { border-left: 4px solid #ff6b6b; }
        .game-card.gobang { border-left: 4px solid #43e97b; }
        .footer {
            margin-top: 40px;
            font-size: 0.8em;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="title">游戏合集</div>
    <div class="subtitle">选择你想玩的游戏</div>
    <div class="game-list">
        <a class="game-card fc" href="fc.html">
            <div class="game-icon">🎮</div>
            <div class="game-info">
                <h2>FC 经典游戏</h2>
                <p>80+ 款红白机游戏 · 魂斗罗 / 超级玛丽 / 坦克大战 ...</p>
            </div>
        </a>
        <a class="game-card gobang" href="gobang/index.html">
            <div class="game-icon">⚫</div>
            <div class="game-info">
                <h2>小小白五子棋</h2>
                <p>经典五子棋 · 支持双人对战 / AI对战(三种难度)</p>
            </div>
        </a>
    </div>
    <div class="footer">v1.0</div>
</body>
</html>
