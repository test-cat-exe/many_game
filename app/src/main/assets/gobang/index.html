<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小白 - 五子棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            width: 95vw;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .status {
            font-size: 1.2em;
            margin: 10px 0;
            text-align: center;
            min-height: 30px;
        }

        .board {
            background: #f8f0e3;
            border: 2px solid #8b4513;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
            aspect-ratio: 1/1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9em;
            text-align: center;
            opacity: 0.9;
        }

        /* 模式选择界面 */
        .mode-select {
            text-align: center;
        }

        .mode-select h2 {
            font-size: 1.4em;
            margin-bottom: 20px;
        }

        .mode-group {
            margin-bottom: 15px;
        }

        .mode-group-label {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .mode-btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 20px;
            font-size: 1em;
            min-width: 80px;
        }

        .mode-btn.pvp {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }

        .mode-btn.easy {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
        }

        .mode-btn.normal {
            background: linear-gradient(45deg, #fa709a, #fee140);
        }

        .mode-btn.hard {
            background: linear-gradient(45deg, #f5515f, #a1051d);
        }

        .back-btn {
            background: linear-gradient(45deg, #a18cd1, #fbc2eb);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 2em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="game-title">小小白</div>
            <div class="subtitle">经典五子棋</div>
        </div>

        <!-- 模式选择界面 -->
        <div class="mode-select" id="modeSelect">
            <h2>选择游戏模式</h2>
            <div class="mode-group">
                <div class="mode-btn-row">
                    <button class="mode-btn pvp" onclick="game.startGame('pvp')">双人对战</button>
                </div>
            </div>
            <div class="mode-group">
                <div class="mode-group-label">人机对战</div>
                <div class="mode-btn-row">
                    <button class="mode-btn easy" onclick="game.startGame('ai','easy')">简单</button>
                    <button class="mode-btn normal" onclick="game.startGame('ai','normal')">普通</button>
                    <button class="mode-btn hard" onclick="game.startGame('ai','hard')">困难</button>
                </div>
            </div>
        </div>

        <!-- 游戏界面（初始隐藏） -->
        <div id="gameArea" class="hidden">
            <div class="status" id="status">黑棋先行</div>

            <div class="board">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls">
                <button id="restartBtn">重新开始</button>
                <button id="undoBtn">悔棋</button>
                <button id="backBtn" class="back-btn">返回菜单</button>
            </div>

            <div class="instructions">
                点击棋盘落子，五子连珠即获胜！
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
